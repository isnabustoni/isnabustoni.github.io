<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Publications</title>
</head>

<body>

<h1>Publications</h1>

<div id="pub-list"></div>

<script>

fetch("./data/google_scholar.json")
  .then(response => response.json())
  .then(data => {

    const container = document.getElementById("pub-list");

    data.forEach(pub => {

      const div = document.createElement("div");

      div.innerHTML = `
        <p>
        <b>${pub.title}</b><br>
        ${pub.authors}<br>
        ${pub.venue} (${pub.year})
        </p>
      `;

      container.appendChild(div);

    });

  });

</script>

</body>
</html>
